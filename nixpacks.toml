[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "pnpm install"
]

[phases.build]
cmds = [
  "pnpm -r --filter @paperclipai/shared build",
  "pnpm -r --filter @paperclipai/db build",
  "pnpm -r --filter @paperclipai/adapter-utils build",
  "pnpm -r --filter @paperclipai/plugin-sdk build",
  "pnpm -r --filter @paperclipai/adapters/* build",
  "pnpm -r --filter @paperclipai/ui build",
  "pnpm -r --filter @paperclipai/server build"
]

[start]
cmd = "cd server && node dist/index.js"
